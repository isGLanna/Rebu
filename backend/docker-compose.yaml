services:
  redis:
    image: redis:8
    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

    restart: unless-stopped

  database:
    image: postgres:18
    container_name: rebu-db

    environment:
      POSTGRES_DB: App_rebu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "food"

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 3

    restart: unless-stopped

  backend:
    image: rebu-backend:v1
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rebu-backend

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "3001:3001"

    env_file:
      - .env

    environment:
      NODE_ENV: development

      JWT_SECRET: "segredo_rebu"

      ORS_API_KEY: ${ORS_API_KEY}       # <<-- Lembrar de declarar no .env

      DB_NAME: App_rebu
      DB_USER: postgres
      DB_PASSWORD: "food"
      DB_HOST: database
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Integração com o Core RideFleet
      # URL base do Core (com prefixo /api/v1 conforme openapi.yaml)
      CORE_URL: "http://192.168.1.131:8080/api/v1"
      #mudar se for conectar com core novamente

      # API Key obtida via POST /groups/register (atualizar após primeiro boot)
      CORE_API_KEY: "rfk_3e745a592749ff61eb1bccac54fe600d"

      # Identificador único deste grupo no ecossistema RideFleet
      GROUP_ID: "rebu"

      # URL deste serviço acessível pelo Core na rede Docker
      # O Core usará esta URL para enviar os webhooks de leilão e atribuição
      SERVICE_URL: "http://192.168.1.131:3001"
      #mudar o ip para o novo se for testar novamente
    depends_on:
      database:
        condition: service_healthy

      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    command: npm run dev

    # Backend usa apenas a rede interna do compose (acesso ao redis e ao banco)
    # A comunicação com o Core externo (200.17.77.96) é feita via IP pelo host
    networks:
      - default
      
volumes:
  postgres_data:
  redis-data:

networks:
  default:
    name: rebu-network
    external: true