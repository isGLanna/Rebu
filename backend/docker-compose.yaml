services:
  redis:
    image: redis:8
    container_name: redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

    restart: unless-stopped

  database:
    image: postgres:18
    container_name: rebu-db

    environment:
      POSTGRES_DB: App_rebu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "food"

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 3

    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rebu-backend

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "3001:3001"

    environment:
      NODE_ENV: development

      JWT_SECRET: "segredo_rebu"

      ORS_API_KEY: "SUA_CHAVE_AQUI"

      DB_NAME: App_rebu
      DB_USER: postgres
      DB_PASSWORD: "food"
      DB_HOST: database
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      database:
        condition: service_healthy

      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    command: npm run dev

volumes:
  postgres_data: