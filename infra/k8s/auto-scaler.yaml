apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rebu-backend-hpa
  labels:
    app.kubernetes.io/name: rebu-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rebu-backend-deployment
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 90
  # Configuração adicional só pra teste: cria políticas de desligamento de instâncias
  behavior:
    scaleDown:
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      #stabilizationWindowSeconds: 180         # <- Tempo de estabilização após desligar uma instância