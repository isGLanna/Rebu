apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    scrape_configs:
    - job_name: 'prometheus'
      static_configs:
        - targets:
          - localhost:9090
    
    - job_name: 'rebu-backend'
      metrics_path: '/metrics'
      static_configs:
        - targets:
          - rebu-backend-service.default:3001
