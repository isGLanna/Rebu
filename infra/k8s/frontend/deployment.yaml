apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile
spec:
  selector:
    matchLabels:
      app: mobile
  template:
    metadata:
      labels:
        app: mobile
    spec:
      containers:
      - name: mobile
        image: rebu-mobile:latest
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
