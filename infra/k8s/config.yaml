kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "my-label=true"
  extraPortMappings:
  - containerPort: 443
    hostPort: 433
    protocol: TCP
  - containerPort: 3001
    hostPort: 3001
    protocol: TCP