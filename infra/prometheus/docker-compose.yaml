version: '3'

services:
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    ports:
      - 9090:9090
    volumes:
      - ./data/prometheus:/prometheus
      - ./config:/etc/prometheus
    networks:
      - rebu-network

  grafana:
    image: grafana/grafana-enterprise:13.1.0
    container_name: grafana
    volumes:
      - ./data/grafana:/var/lib/grafana
    ports:
      - 3000:3000
    depends_on:
      - prometheus
    networks:
      - rebu-network

networks:
  rebu-network:
    driver: bridge
